  <!-- Site-wide search indexes (title index + deep content index), scoped below to this section only -->
  <script src="../../search-index-main.js"></script>

  <script src="../../search-snippets-pinnacle.js"></script>
  <script>
    (function () {
      var SECTION_PREFIX = "./Books/Pinnacle%20GS/";
      var REL_ROOT = "../../";
      var input = document.getElementById("efScopedSearch");
      var clearBtn = document.getElementById("efScopedSearchClear");
      var resultsEl = document.getElementById("efScopedResults");
      var noResultsEl = document.getElementById("efScopedNoResults");
      var origPlaceholder = input.placeholder;

      function ready() { return typeof SEARCH_INDEX !== "undefined"; }
      if (!ready()) {
        input.placeholder = "Loading search index...";
        var waitTimer = setInterval(function () {
          if (ready()) {
            input.placeholder = origPlaceholder;
            clearInterval(waitTimer);
          }
        }, 200);
      }

      function clearResults() {
        resultsEl.innerHTML = "";
        noResultsEl.classList.remove("show");
      }

      function runSearch(qRaw) {
        clearResults();
        var q = qRaw.trim();
        if (q.length < 2 || !ready()) return;
        var terms = q.toLowerCase().split(/\s+/).filter(Boolean);

        // Primary: efSnippetSearch (search-snippets-*.js) shows a real highlighted
        // excerpt from inside the page — the same way Current Affairs / Bihar Special
        // already do — instead of just the bare chapter name. Falls back to plain
        // title/breadcrumb matches (efSearchRank) for pages the snippet index doesn't
        // cover (e.g. subject/part hub pages).
        var snippetHits = (typeof efSnippetSearch === "function")
          ? efSnippetSearch(q, { sectionPrefix: SECTION_PREFIX, limit: 30 })
          : [];
        var usedUrls = {};
        var results = [];
        snippetHits.forEach(function (hit) {
          if (usedUrls[hit.f]) return;
          usedUrls[hit.f] = true;
          results.push(hit);
        });
        var titleHits = (typeof efSearchRank === "function")
          ? efSearchRank(q, { sectionPrefix: SECTION_PREFIX, limit: 30 })
          : [];
        titleHits.forEach(function (rec) {
          if (usedUrls[rec.url]) return;
          results.push({ f: rec.url, t: rec.title, b: rec.breadcrumb, x: null });
        });
        results = results.slice(0, 30);

        if (results.length === 0) {
          noResultsEl.classList.add("show");
          return;
        }
        results.forEach(function (rec) {
          var li = document.createElement("li");
          var a = document.createElement("a");
          a.href = REL_ROOT + rec.f.slice(2);
          var titleSpan = document.createElement("span");
          titleSpan.className = "ef-result-title";
          titleSpan.textContent = rec.t;
          a.appendChild(titleSpan);
          if (rec.x) {
            var snipSpan = document.createElement("span");
            snipSpan.className = "ef-result-snippet";
            snipSpan.innerHTML = (typeof efSnippetWithHighlight === "function")
              ? efSnippetWithHighlight(rec.x, terms)
              : "";
            a.appendChild(snipSpan);
          } else {
            var bcSpan = document.createElement("span");
            bcSpan.className = "ef-result-breadcrumb";
            bcSpan.textContent = rec.b;
            a.appendChild(bcSpan);
          }
          li.appendChild(a);
          resultsEl.appendChild(li);
        });
      }

      input.addEventListener("input", function () {
        clearBtn.classList.toggle("show", this.value.length > 0);
        runSearch(this.value);
      });
      clearBtn.addEventListener("click", function () {
        input.value = "";
        clearResults();
        clearBtn.classList.remove("show");
        input.focus();
      });
      input.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          input.value = "";
          clearResults();
          clearBtn.classList.remove("show");
        }
        if (e.key === "Enter") {
          var first = resultsEl.querySelector("a");
          if (first) first.click();
        }
      });
    })();
  </script>

  <script>

    function openPage(event) {

      event.preventDefault();

      const linkEl = event.currentTarget;
      const link = linkEl.href;

      if (!linkEl.dataset.original) {
        linkEl.dataset.original = linkEl.innerText;
      }

      linkEl.innerText = "✨ Loading...";
      linkEl.style.opacity = "0.7";

      setTimeout(function () {
        window.location.href = link;
      }, 600);

    }

    window.addEventListener("pageshow", function () {

      document.querySelectorAll("a").forEach(function (a) {

        if (a.dataset.original) {
          a.innerText = a.dataset.original;
          a.style.opacity = "1";
        }

      });

    });

  </script>
